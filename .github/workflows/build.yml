name: Build, Test, Publish

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim/ReadMe.md"
      - "EventBrokerSlim/ReadMe.md" 
      - "EventBrokerSlim/EventBrokerSlim-Persistence-Architecture.md" 
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.Redis/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.PostgreSql/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.Sqlite/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.SqlServer/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.LiteDb/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.MongoDb/ReadMe.md"
      - "EventBrokerSlim/package-icon.png" 
      - "FuncPipeline/ReadMe.md"
      - ".gitignore" 
    tags:
      - '*'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim/ReadMe.md"
      - "EventBrokerSlim/ReadMe.md" 
      - "EventBrokerSlim/EventBrokerSlim-Persistence-Architecture.md" 
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.Redis/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.PostgreSql/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.Sqlite/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.SqlServer/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.LiteDb/ReadMe.md"
      - "EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.MongoDb/ReadMe.md"
      - "EventBrokerSlim/package-icon.png" 
      - "FuncPipeline/ReadMe.md"
      - ".gitignore" 

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      checks: write  

    steps:
 
    - uses: actions/checkout@v6

    - id: set-version
      name: Set Version
      run: |
        ref=${{ github.ref }}
        pattern="^refs/tags/(EventBrokerSlim|EventBrokerSlim.PersistentEvents.PostgreSql|EventBrokerSlim.PersistentEvents.Redis|EventBrokerSlim.PersistentEvents.SqlServer|EventBrokerSlim.PersistentEvents.Sqlite|EventBrokerSlim.PersistentEvents.LiteDb|EventBrokerSlim.PersistentEvents.MongoDb|FuncPipeline)_v([0-9]+.[0-9]+.[0-9]+(-.+)?)$"
        
        if [[ $ref =~ $pattern ]]; then
          is_release=true
          version=${BASH_REMATCH[2]}
          project=${BASH_REMATCH[1]}
        else
          is_release=false
          version="0.0.1-build$(date +'%Y%m%d'-'%H%M%S')"
        fi  
        
        echo "IS_RELEASE=$is_release" >> $GITHUB_ENV
        echo "VERSION=$version" >> $GITHUB_ENV
        echo "PROJECT=$project" >> $GITHUB_ENV

    - id: print-version
      name: Print Version
      run: |
        echo "is release:  ${{ env.IS_RELEASE }}"
        echo "version: ${{ env.VERSION }}"
        echo "project: ${{ env.PROJECT }}"

    - name: Restore dependencies
      run: dotnet restore EventBrokerSlim.slnx

    - name: Build
      run: dotnet build EventBrokerSlim.slnx --no-restore --configuration Release -p:Version=${{ env.VERSION }}

    - name: Run All Tests
      run: dotnet test --no-build --no-restore --verbosity normal --configuration Release --report-trx -- --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml

    - name: Install Markdown Test Report Tool
      if: success() || failure()
      run: dotnet tool install --global LiquidTestReports.Cli --version 2.0.0-beta.6

    - name: Generate Markdown Test Report
      if: success() || failure()
      run: liquid --inputs "File=**/*.trx;Format=Trx" --output-file testresults/testresults.md --title "Tests"

    - name: Output Tests Summary
      if: success() || failure()
      run: |
        summary=$(<"testresults/testresults.md")
        echo "$summary" >> "$GITHUB_STEP_SUMMARY"

    - name: Tests Code Coverage Report
      if: success() || failure()  
      uses: danielpalme/ReportGenerator-GitHub-Action@v5
      with:
        reports: "**/coverage.cobertura.xml"
        targetdir: "coveragereport"
        reporttypes: "MarkdownSummaryGithub"
        verbosity: "Info"
        title: "Tests Code Coverage"
        toolpath: "reportgeneratortool"

    - name: Output Code Coverage Summary
      if: success() || failure()
      run: |
        summary=$(<"coveragereport/SummaryGithub.md")
        echo "$summary" >> "$GITHUB_STEP_SUMMARY"

    - name: Create NuGet Package for EventBrokerSlim
      if: ${{ success() && env.IS_RELEASE == 'true' && env.PROJECT == 'EventBrokerSlim' }}    
      run: dotnet pack EventBrokerSlim/src/M.EventBrokerSlim/M.EventBrokerSlim.csproj -p:PackageVersion=${{ env.VERSION }} --output ./ --configuration Release --no-restore --no-build  -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg
    
    - name: Create NuGet Package for EventBrokerSlim.PersistentEvents.PostgreSql
      if: ${{ success() && env.IS_RELEASE == 'true' && env.PROJECT == 'EventBrokerSlim.PersistentEvents.PostgreSql' }}    
      run: dotnet pack EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.PostgreSql/M.EventBrokerSlim.PersistentEvents.PostgreSql.csproj -p:PackageVersion=${{ env.VERSION }} --output ./ --configuration Release --no-restore --no-build  -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

    - name: Create NuGet Package for FuncPipeline
      if: ${{ success() && env.IS_RELEASE == 'true' && env.PROJECT == 'FuncPipeline' }}    
      run: dotnet pack FuncPipeline/src/FuncPipeline/FuncPipeline.csproj -p:PackageVersion=${{ env.VERSION }} --output ./ --configuration Release --no-restore --no-build  -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg
    
    - name: Create NuGet Package for EventBrokerSlim.PersistentEvents.Redis
      if: ${{ success() && env.IS_RELEASE == 'true' && env.PROJECT == 'EventBrokerSlim.PersistentEvents.Redis' }}    
      run: dotnet pack EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.Redis/M.EventBrokerSlim.PersistentEvents.Redis.csproj -p:PackageVersion=${{ env.VERSION }} --output ./ --configuration Release --no-restore --no-build  -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

    - name: Create NuGet Package for EventBrokerSlim.PersistentEvents.SqlServer
      if: ${{ success() && env.IS_RELEASE == 'true' && env.PROJECT == 'EventBrokerSlim.PersistentEvents.SqlServer' }}    
      run: dotnet pack EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.SqlServer/M.EventBrokerSlim.PersistentEvents.SqlServer.csproj -p:PackageVersion=${{ env.VERSION }} --output ./ --configuration Release --no-restore --no-build  -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

    - name: Create NuGet Package for EventBrokerSlim.PersistentEvents.Sqlite
      if: ${{ success() && env.IS_RELEASE == 'true' && env.PROJECT == 'EventBrokerSlim.PersistentEvents.Sqlite' }}    
      run: dotnet pack EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.Sqlite/M.EventBrokerSlim.PersistentEvents.Sqlite.csproj -p:PackageVersion=${{ env.VERSION }} --output ./ --configuration Release --no-restore --no-build  -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

    - name: Create NuGet Package for EventBrokerSlim.PersistentEvents.LiteDb
      if: ${{ success() && env.IS_RELEASE == 'true' && env.PROJECT == 'EventBrokerSlim.PersistentEvents.LiteDb' }}    
      run: dotnet pack EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.LiteDb/M.EventBrokerSlim.PersistentEvents.LiteDb.csproj -p:PackageVersion=${{ env.VERSION }} --output ./ --configuration Release --no-restore --no-build  -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

    - name: Create NuGet Package for EventBrokerSlim.PersistentEvents.MongoDb
      if: ${{ success() && env.IS_RELEASE == 'true' && env.PROJECT == 'EventBrokerSlim.PersistentEvents.MongoDb' }}    
      run: dotnet pack EventBrokerSlim/src/M.EventBrokerSlim.PersistentEvents.MongoDb/M.EventBrokerSlim.PersistentEvents.MongoDb.csproj -p:PackageVersion=${{ env.VERSION }} --output ./ --configuration Release --no-restore --no-build  -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

    - name: Publish NuGet Package
      if: ${{ success() && env.IS_RELEASE == 'true' }}    
      run: dotnet nuget push "*.nupkg" -k ${{ secrets.NUGET_API }} -s https://api.nuget.org/v3/index.json
